<div
  class="card bg-pink-100 gap-3 w-4xl mx-auto flex flex-col items-center rounded-xl shadow-xl p-10"
>
  <svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 24 24"
    fill="currentColor"
    class="size-32 text-rose-400"
  >
    <path
      fill-rule="evenodd"
      d="M1.72 5.47a.75.75 0 0 1 1.06 0L9 11.69l3.756-3.756a.75.75 0 0 1 .985-.066 12.698 12.698 0 0 1 4.575 6.832l.308 1.149 2.277-3.943a.75.75 0 1 1 1.299.75l-3.182 5.51a.75.75 0 0 1-1.025.275l-5.511-3.181a.75.75 0 0 1 .75-1.3l3.943 2.277-.308-1.149a11.194 11.194 0 0 0-3.528-5.617l-3.809 3.81a.75.75 0 0 1-1.06 0L1.72 6.53a.75.75 0 0 1 0-1.061Z"
      clip-rule="evenodd"
    />
  </svg>

  <h1 class="card-title text-4xl justify-center">Ooops!!!</h1>

  <p class="card-body text-xl text-center">{{ error.message }}</p>
  <button (click)="detailsToggle()" class="btn btn-error text-white">Details</button>
  @if (showDetails) {
    <div>{{ error.details }}</div>
  }
</div>
